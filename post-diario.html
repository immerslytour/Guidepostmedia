<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Guidepost Media — Publicación de hoy</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:#FAFAF9; color:#1A1A1A;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:flex-start; justify-content:center; padding:32px 16px;
  }
  .card{
    width:100%; max-width:420px; background:#fff; border:1px solid #E5E5E3;
    border-radius:12px; padding:28px 24px;
  }
  h1{ font-size:20px; margin:0 0 4px; }
  p.sub{ font-size:14px; color:#666; margin:0 0 24px; }

  .field{ margin-bottom:18px; }
  label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:#333; }
  select, input[type="text"], textarea{
    width:100%; border:1px solid #D8D8D6; border-radius:8px;
    font-size:15px; padding:10px 12px; font-family:inherit; color:#1A1A1A; background:#fff;
  }
  select:focus, input:focus, textarea:focus{ outline:none; border-color:#1A1A1A; }
  textarea{ resize:vertical; min-height:90px; }

  input[type="file"]{
    width:100%; font-size:14px; padding:10px 0;
  }
  .preview{ margin-top:10px; border-radius:8px; overflow:hidden; max-height:200px; display:none; }
  .preview img{ width:100%; display:block; }

  #otroWrap{ display:none; margin-top:8px; }

  button[type="submit"]{
    width:100%; background:#1A1A1A; color:#fff; border:none; border-radius:8px;
    padding:13px; font-size:15px; font-weight:600; cursor:pointer;
  }
  button[type="submit"]:disabled{ opacity:.5; cursor:not-allowed; }
  .status{ margin-top:12px; font-size:13px; text-align:center; min-height:18px; color:#666; }
  .status.error{ color:#C1531B; }

  .success-screen{ display:none; text-align:center; padding:20px 0; }
  .success-screen h2{ font-size:19px; margin:0 0 8px; }
  .success-screen p{ color:#666; font-size:14px; line-height:1.5; margin:0; }
</style>
</head>
<body>

<div class="card">
  <div id="formWrap">
    <h1>Publicación de hoy</h1>
    <p class="sub" id="todayDate"></p>

    <form name="daily-post" method="POST" data-netlify="true" enctype="multipart/form-data" id="postForm">
      <input type="hidden" name="form-name" value="daily-post" />

      <div class="field">
        <label>¿Cuál negocio eres?</label>
        <select name="negocio" id="negocioSelect" required>
          <option value="" disabled selected>Selecciona tu negocio</option>
          <option value="El San Marcos">El San Marcos</option>
          <option value="Lalo's Taqueria">Lalo's Taqueria</option>
          <option value="Tacos El Chilango">Tacos El Chilango</option>
          <option value="Oaxaca Restaurant">Oaxaca Restaurant</option>
          <option value="Rosy's Mexican Restaurant">Rosy's Mexican Restaurant</option>
          <option value="Chelita's Taquería">Chelita's Taquería</option>
          <option value="Tacos El Palmar">Tacos El Palmar</option>
          <option value="Otro">Otro</option>
        </select>
        <div id="otroWrap">
          <input type="text" name="negocio_otro" id="negocioOtro" placeholder="Escribe el nombre de tu negocio" />
        </div>
      </div>

      <div class="field">
        <label>Foto de hoy</label>
        <input type="file" accept="image/*" capture="environment" id="photoInput" name="foto" required />
        <div class="preview" id="preview"><img id="previewImg" /></div>
      </div>

      <div class="field">
        <label>¿Qué quieres anunciar?</label>
        <textarea name="descripcion" id="descInput" placeholder="Ej: Hoy estamos en el parque de la calle 5ta, especial de birria desde las 11am" required></textarea>
      </div>

      <button type="submit" id="submitBtn">Enviar publicación</button>
      <div class="status" id="statusMsg"></div>
    </form>
  </div>

  <div class="success-screen" id="successScreen">
    <h2>¡Recibido!</h2>
    <p>Tu publicación queda lista para salir hoy en redes y Google Maps.</p>
  </div>
</div>

<script>
document.getElementById('todayDate').textContent = new Date().toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });

const negocioSelect = document.getElementById('negocioSelect');
const otroWrap = document.getElementById('otroWrap');
const negocioOtro = document.getElementById('negocioOtro');
negocioSelect.addEventListener('change', () => {
  const isOtro = negocioSelect.value === 'Otro';
  otroWrap.style.display = isOtro ? 'block' : 'none';
  negocioOtro.required = isOtro;
});

const photoInput = document.getElementById('photoInput');
let compressedBlob = null;

photoInput.addEventListener('change', () => {
  const file = photoInput.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('preview').style.display = 'block';

    const img = new Image();
    img.onload = () => {
      const maxW = 1600;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => { compressedBlob = blob; }, 'image/jpeg', 0.8);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('postForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const submitBtn = document.getElementById('submitBtn');
  const statusEl = document.getElementById('statusMsg');

  submitBtn.disabled = true;
  statusEl.className = 'status';
  statusEl.textContent = 'Enviando...';

  try {
    const form = document.getElementById('postForm');
    const formData = new FormData(form);

    if (compressedBlob) {
      formData.set('foto', compressedBlob, 'foto.jpg');
    }

    const negocioFinal = negocioSelect.value === 'Otro' ? negocioOtro.value : negocioSelect.value;
    formData.set('negocio', negocioFinal);

    await fetch('/', { method: 'POST', body: formData });

    document.getElementById('formWrap').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
  } catch (err) {
    console.error(err);
    statusEl.classList.add('error');
    statusEl.textContent = 'Algo falló. Intenta otra vez o avísale a Sergio.';
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
